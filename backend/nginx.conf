# ============================================================================
# Reverse proxy (dev/staging, HTTP). Single public origin:
#   /api, /health, /metrics, /docs, /openapi.json  -> FastAPI backend
#   everything else (/, /_next, /sso/callback, ...) -> Next.js frontend
# Same-origin => SSO redirect + refresh cookie work without CORS.
# For TLS use nginx.prod.conf (see docker-compose.prod.yml).
# ============================================================================

upstream hrm_api {
    server api:8000;
    keepalive 32;
}

upstream hrm_frontend {
    server frontend:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;

server {
    listen 80;
    server_name _;
    client_max_body_size 25m;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # ---- Backend ----
    location /api/ {
        limit_req zone=api_rl burst=40 nodelay;
        proxy_pass http://hrm_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://hrm_api/health;
        access_log off;
    }

    # OpenAPI docs (disabled by the app in production anyway).
    location /docs         { proxy_pass http://hrm_api; }
    location /openapi.json { proxy_pass http://hrm_api; }

    location = /metrics {
        # Scrape from the monitoring network only.
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://hrm_api/metrics;
        access_log off;
    }

    # ---- Frontend (Next.js) ----
    location / {
        proxy_pass http://hrm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
