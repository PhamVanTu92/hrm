# ============================================================================
# HRM backend — local / staging stack.
#   nginx  -> reverse proxy + TLS termination (edge)
#   api    -> FastAPI under gunicorn/uvicorn
#   worker -> Celery worker (all queues; split per-queue to scale)
#   beat   -> Celery beat scheduler (RedBeat)
#   db     -> PostgreSQL 16
#   pgbouncer -> connection pooler in front of Postgres
#   redis  -> cache / broker / rate-limit / locks
#   minio  -> S3-compatible object storage (payslip PDFs)
#
# Bring it up:  docker compose up -d --build
# The api/worker/beat all run the SAME image; only `command` differs.
# ============================================================================

x-app-image: &app-image
  build:
    context: .
    dockerfile: Dockerfile
  image: hrm-backend:local
  env_file: .env
  restart: unless-stopped

services:
  # ---------------------------------------------------------------- database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrm_password}
      POSTGRES_DB: ${POSTGRES_DB:-hrm}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # expose for local psql; drop in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrm} -d ${POSTGRES_DB:-hrm}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------- pgbouncer pool
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-hrm}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-hrm_password}
      DB_NAME: ${POSTGRES_DB:-hrm}
      POOL_MODE: transaction        # required for high connection counts
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "6432:6432"
    restart: unless-stopped

  # --------------------------------------------------------------------- redis
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "noeviction"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ------------------------------------------------------------ object storage
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"          # S3 API
      - "9001:9001"          # web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ----------------------------------------------------------- migration (run once)
  migrate:
    <<: *app-image
    command: ["alembic", "upgrade", "head"]
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
    restart: "no"

  # ----------------------------------------------- bootstrap (run once) -------
  # Seeds RBAC + default login accounts (admin/hr/manager/employee). Idempotent.
  # In production it refuses unless BOOTSTRAP_FORCE=1 (don't ship default creds).
  bootstrap:
    <<: *app-image
    command: ["python", "-m", "scripts.bootstrap"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  # ----------------------------------------------------------------------- api
  api:
    <<: *app-image
    # CMD from the Dockerfile (gunicorn) is used as-is.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bootstrap:
        condition: service_completed_successfully
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # -------------------------------------------------------------------- worker
  worker:
    <<: *app-image
    # One worker consuming every queue. To scale, run one service per queue
    # (e.g. -Q payroll with more replicas) instead of -Q default,...,attendance.
    command:
      - celery
      - -A
      - app.core.celery_app
      - worker
      - --loglevel=info
      - --concurrency=4
      - -Q
      - default,attendance,payroll,pdf,email
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ---------------------------------------------------------------------- beat
  beat:
    <<: *app-image
    # RedBeat keeps the schedule in Redis so beat can be restarted safely.
    command:
      - celery
      - -A
      - app.core.celery_app
      - beat
      - --loglevel=info
      - -S
      - redbeat.RedBeatScheduler
    depends_on:
      redis:
        condition: service_healthy

  # ------------------------------------------------------------------- frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SSO_ENABLED: "${NEXT_PUBLIC_SSO_ENABLED:-false}"
    image: hrm-frontend:local
    environment:
      # nginx routes /api directly to the backend, so this is only a fallback.
      BACKEND_ORIGIN: http://api:8000
    expose:
      - "3000"
    depends_on:
      - api
    restart: unless-stopped

  # --------------------------------------------------------------------- nginx
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  minio_data:
