# ============================================================================
# HOST nginx vhost for newhrm.foxai.com.vn (the existing system nginx on the
# server, NOT the container nginx). Proxies to the HRM container nginx which
# listens on 127.0.0.1:8090.
#
# Install:
#   sudo cp deploy/newhrm.foxai.com.vn.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/newhrm.foxai.com.vn.conf \
#              /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: issue a cert first (webroot or --nginx), e.g.
#   sudo certbot --nginx -d newhrm.foxai.com.vn
# certbot will fill in the ssl_certificate lines / 443 block automatically. The
# template below is the manual form.
# ============================================================================

# --- HTTP -> HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name newhrm.foxai.com.vn;
    # Let certbot serve the ACME challenge, redirect the rest.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name newhrm.foxai.com.vn;

    ssl_certificate     /etc/letsencrypt/live/newhrm.foxai.com.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/newhrm.foxai.com.vn/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25m;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Everything goes to the HRM container nginx (it splits / vs /api internally).
    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;   # https -> app sees it
        proxy_set_header Connection        "";
        proxy_read_timeout 60s;
    }
}
