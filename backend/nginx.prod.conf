# ============================================================================
# Production reverse proxy — TLS termination on 443, redirect 80 -> 443.
# Mount certs at /etc/nginx/certs (fullchain.pem + privkey.pem) and this file
# at /etc/nginx/conf.d/default.conf (see docker-compose.prod.yml).
# ============================================================================

upstream hrm_api {
    server api:8000;
    keepalive 32;
}

upstream hrm_frontend {
    server frontend:3000;
    keepalive 32;
}

# Edge rate limiting (app-level slowapi still applies per-route).
limit_req_zone $binary_remote_addr zone=api_rl:10m rate=20r/s;

# --- HTTP: redirect everything to HTTPS ---
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# --- HTTPS ---
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    # Modern, secure TLS only.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 25m;
    server_tokens off;

    # HSTS (only over HTTPS) + defense-in-depth headers.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # ---- Backend ----
    location /api/ {
        limit_req zone=api_rl burst=40 nodelay;
        proxy_pass http://hrm_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;
    }

    location = /health {
        proxy_pass http://hrm_api/health;
        access_log off;
    }

    # Prometheus metrics — restrict to the monitoring network only.
    location = /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        deny all;
        proxy_pass http://hrm_api/metrics;
        access_log off;
    }

    # ---- Frontend (Next.js) ----
    location / {
        proxy_pass http://hrm_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
